Reports the <code>final</code> specifier on a constructor or destructor.
<p>
Neither a constructor nor a destructor can be inherited or overridden, so marking one
<code>final</code> is meaningless. The klangc compiler rejects it unconditionally, whether the
enclosing type is a <code>struct</code> or a <code>class</code>.
</p>
